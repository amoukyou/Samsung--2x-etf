name: 更新股价数据

on:
  schedule:
    # 新闻全天候更新 (每小时一次, 含周末)
    - cron: '0 * * * *'
    # 交易时段价格数据 (每30分钟, 周一至周五)
    # 韩股 09:00-15:30 KST = 00:00-06:30 UTC, 港股 01:30-08:00 UTC
    - cron: '*/30 0-9 * * 1-5'
    # 收盘后再跑一次确保最终数据
    - cron: '0 10 * * 1-5'
  workflow_dispatch:  # 手动触发

concurrency:
  group: update-data
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: echo "无需额外依赖, 纯标准库"

      - name: 抓取数据
        run: python fetch_data.py

      - name: 提交更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "自动更新股价数据 $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git pull --rebase
          git push
